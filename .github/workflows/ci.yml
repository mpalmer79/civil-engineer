name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest + coverage + migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage gate
        # Coverage floor is 90 percent, set just under the 92 percent measured
        # at the time of writing (see PR description). Raise the floor as
        # coverage grows; never lower it to make a build pass.
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=90
      - name: Python dependency audit
        # Release gate: no known vulnerabilities in the pinned backend
        # dependency set. Exceptions require a documented owner and expiry in
        # docs/internal/DEPENDENCY_REMEDIATION.md.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
      - name: Validate migrations have a single head
        run: |
          python - <<'EOF'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          heads = ScriptDirectory.from_config(Config("alembic.ini")).get_heads()
          assert len(heads) == 1, f"Expected exactly one Alembic head, found: {heads}"
          print(f"Single migration head confirmed: {heads[0]}")
          EOF
      - name: Application import check
        run: python -c "from app.main import app; print('FastAPI app imports cleanly')"

  frontend:
    name: Frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production dependency audit
        # Release gate: zero known high or critical vulnerabilities in
        # production dependencies. Moderate findings require a documented,
        # owned exception in docs/internal/DEPENDENCY_REMEDIATION.md before
        # any threshold change here.
        run: npm audit --omit=dev --audit-level=high
      - name: Full-tree dependency audit
        # Development tooling is part of the supply chain. No known high or
        # critical vulnerabilities anywhere in the tree.
        run: npm audit --audit-level=high
      - name: Repository complexity budget
        # Fails when an authored source file crosses the hard size ceiling
        # without an allowlisted cohesion reason.
        run: node scripts/check-complexity.mjs
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Content integrity (attribution and em dash gate)
        run: npm run check:content
      - name: Guide knowledge freshness (sources, routes, generated facts)
        run: npm run check:guide
      - name: Test with coverage floors
        run: npm run test:coverage
      - name: Production build
        # The build has no network dependency (the app uses a system font
        # stack, not next/font/google), so it runs in a sandboxed CI runner.
        run: npm run build

  contracts:
    name: API contract freshness (OpenAPI + generated types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        run: npm ci
      - name: Verify generated contract is current
        # Regenerates openapi.json from the FastAPI app and schema.d.ts from
        # openapi-typescript, then fails if the committed artifacts differ.
        run: node scripts/generate-api-types.mjs --check

  dxf-proof:
    name: DXF proof harness (generate, parse, verify, artifact freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run the proof harness against versioned ground truth
        # Generates the synthetic DXF, uploads and parses it through the real
        # FastAPI routes, compares against scripts/dxf_proof_expected.json,
        # and regenerates the four public artifacts plus the manifest. Exits
        # nonzero when any ground-truth check fails.
        run: python scripts/run_dxf_proof.py
      - name: Verify committed proof artifacts are current
        # The generator and harness are byte-deterministic, so regenerated
        # artifacts must match the committed bytes exactly.
        run: git diff --exit-code public/proof-of-concept

  e2e:
    name: Browser suite (Playwright + Axe over Next.js and FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build the production frontend
        run: npm run build
        env:
          BACKEND_API_BASE_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      - name: Run Playwright journeys and Axe accessibility gate
        # Public, authentication, DXF upload-and-parse, and accessibility
        # suites against a disposable SQLite-backed backend. Serious and
        # critical Axe violations fail the build.
        run: npx playwright test
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
