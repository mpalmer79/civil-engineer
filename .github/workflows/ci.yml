name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov
      - name: Run tests with coverage gate
        # Coverage floor is 90 percent, set just under the 92 percent measured
        # at the time of writing (see PR description). Raise the floor as
        # coverage grows; never lower it to make a build pass.
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=90

  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      # Note: we intentionally do not run "next build" in CI. The production
      # build fetches Google Fonts at build time, which fails in a sandboxed CI
      # runner without outbound network access. Typecheck, lint, and unit tests
      # cover the frontend here; the build is validated locally before release.
