[pytest]
# Dependency note: the file-parsing package was renamed from "multipart" to
# "python_multipart". Starlette (pulled in by FastAPI) still imports the legacy
# "multipart" name, which emits a PendingDeprecationWarning we do not control.
# Phase 12 adds a browser DXF upload endpoint that uses python-multipart, but the
# legacy import warning is still noise we cannot fix here. Filter only that exact
# message so genuine warnings stay visible.
filterwarnings =
    ignore:Please use `import python_multipart` instead.:PendingDeprecationWarning
