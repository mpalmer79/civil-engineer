# Alembic configuration for the Civil Engineer AI backend.
#
# The database URL is NOT stored here. app/migrations/env.py reads it from the
# application settings (DATABASE_URL) and normalizes it, so SQLite development and
# Postgres production both work without editing this file or hard-coding a secret.

[alembic]
script_location = app/migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
